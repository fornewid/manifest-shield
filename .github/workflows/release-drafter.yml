name: Release Drafter

on:
  push:
    branches: [ main ]
    tags: [ '*.*.*' ]

permissions:
  contents: write
  pull-requests: read

jobs:
  update_draft_release:
    runs-on: self-hosted
    if: github.repository == 'fornewid/manifest-shield'
    steps:
      - uses: release-drafter/release-drafter@v6
        with:
          publish: ${{ startsWith(github.ref, 'refs/tags/') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
